[workspace]
authors = ["Dave Barry <david.barry@crick.ac.uk>"]
channels = ["conda-forge"]
name = "bioio-conv"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.13.*"
pixi-pycharm = ">=0.0.11,<0.0.12"

[pypi-dependencies]
bioio = ">=3.3.0, <4"
numpy = ">=2.4.4, <3"
bioio-tifffile = ">=1.3.0, <2"
bioio-ome-tiff = ">=1.4.0, <2"

[environments]
bioio = ["default"]
